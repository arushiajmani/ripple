# Alembic configuration for Ripple database migrations.
#
# Run from backend/:
#   alembic upgrade head          # apply all pending migrations
#   alembic revision --autogenerate -m "description"  # generate from ORM diff
#
# The sqlalchemy.url below is a placeholder — env.py overrides it with
# DATABASE_URL from app.config (docker-compose sets this for the backend).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
